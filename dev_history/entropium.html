<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entropium — Live 3D Lattice Emergence</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family: monospace; color:#0f0; }
  #ui { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:15px; border-radius:8px; }
  button { background:#0f0; color:#000; border:none; padding:10px 20px; margin:5px; font-size:16px; cursor:pointer; border-radius:4px; }
  button:hover { background:#ff0; }
  #info { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.7); padding:10px; border-radius:4px; font-size:14px; }
</style>
</head>
<body>
<div id="ui">
  <h1 style="margin:0 0 10px 0; color:#0f0;">ENTROPIUM</h1>
  <button onclick="seedAndRelax()">Seed Random Lattice + Relax</button>
  <button onclick="togglePause()">Pause / Resume</button>
  <button onclick="resetDemo()">Reset</button>
  <div style="margin-top:10px;">
    <label>Steps per frame: <input id="steps" type="number" value="8" style="width:60px"></label><br>
    <span id="stats">N = 4096 | β_eff ≈ ? | deff ≈ ?</span>
  </div>
</div>
<div id="info">Watch the bare index set self-organize into 3D space via Dirichlet energy minimization.<br>
β_eff converges to the rigidity attractor ~3 • Live EUT II pre-geometry</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ============== ENTROPIUM DEMO ==============
let scene, camera, renderer, points;
let S = new Float32Array(4096); // lattice sites (N=4096 for smooth 60fps)
let positions = new Float32Array(4096 * 3);
let velocities = new Float32Array(4096 * 3); // simple momentum for relaxation
let beta_eff = 3.0;
let isPaused = false;
let frame = 0;

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 60);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Initial random scalars (bare index set)
  for (let i = 0; i < S.length; i++) {
    S[i] = (Math.random() - 0.5) * 4;
  }
  
  // Geometry
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const material = new THREE.PointsMaterial({
    size: 0.8,
    color: 0x00ff88,
    transparent: true,
    opacity: 0.9,
    vertexColors: false
  });
  points = new THREE.Points(geometry, material);
  scene.add(points);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function updatePositions() {
  const pos = points.geometry.attributes.position.array;
  for (let i = 0; i < S.length; i++) {
    const idx = i * 3;
    // Very simple 3D embedding for visualization (real emergence happens in relaxation)
    pos[idx]     = S[i] * 8 + (i % 16) * 0.5 - 8;
    pos[idx + 1] = ((i >> 4) % 16) * 0.5 - 8 + S[i] * 2;
    pos[idx + 2] = (i >> 8) * 0.5 - 8 + Math.sin(S[i]) * 4;
  }
  points.geometry.attributes.position.needsUpdate = true;
}

function relaxStep(steps = 8) {
  for (let step = 0; step < steps; step++) {
    for (let i = 0; i < S.length; i++) {
      let force = 0;
      // Approximate neighbor interaction (full pairwise would be O(N²), here we use random sampling + mean-field for demo speed)
      for (let k = 0; k < 32; k++) { // 32 random "bonds" per site per step
        const j = Math.floor(Math.random() * S.length);
        if (i === j) continue;
        const deltaS = S[i] - S[j];
        const w = Math.pow(1 + deltaS * deltaS, -beta_eff); // EUT bond stiffness
        force += w * deltaS;
      }
      velocities[i * 3] = velocities[i * 3] * 0.92 + force * 0.0008; // damping + force
      S[i] += velocities[i * 3] * 0.3;
    }
    // Gentle β_eff drift toward attractor (EUT II)
    beta_eff = beta_eff * 0.995 + 3.0 * 0.005;
  }
  frame++;
}

function animate() {
  if (!isPaused) {
    const steps = parseInt(document.getElementById('steps').value) || 8;
    relaxStep(steps);
    updatePositions();
    
    // Live stats
    const avgBeta = beta_eff.toFixed(3);
    document.getElementById('stats').innerHTML = 
      `N = ${S.length} | β_eff ≈ ${avgBeta} | step ${frame} | (emergence in progress…)`;
  }
  
  // Gentle camera orbit
  const time = Date.now() * 0.0003;
  camera.position.x = Math.sin(time) * 70;
  camera.position.z = Math.cos(time) * 70;
  camera.lookAt(0, 0, 0);
  
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

function seedAndRelax() {
  // Fresh random lattice
  for (let i = 0; i < S.length; i++) S[i] = (Math.random() - 0.5) * 6;
  velocities.fill(0);
  beta_eff = 2.5; // start slightly off attractor
  frame = 0;
}

function togglePause() { isPaused = !isPaused; }
function resetDemo() { seedAndRelax(); }

init();
updatePositions();
animate();
</script>
</body>
</html>
