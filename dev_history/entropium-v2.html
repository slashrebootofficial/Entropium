<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entropium v2 — Live Pre-Geometry Emergence</title>
<style>
  body { margin:0; overflow:hidden; background:#000; font-family: monospace; color:#0f0; }
  #ui { position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.85); padding:15px; border-radius:8px; max-width:420px; }
  button { background:#0f0; color:#000; border:none; padding:12px 20px; margin:4px; font-size:15px; cursor:pointer; border-radius:4px; font-weight:bold; }
  button:hover { background:#ff0; }
  #info { position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.85); padding:10px; border-radius:4px; font-size:13px; line-height:1.4; }
</style>
</head>
<body>
<div id="ui">
  <h1 style="margin:0 0 12px 0; color:#0f0; font-size:22px;">ENTROPIUM v2</h1>
  <button onclick="seedLattice()">Seed Random Lattice + Relax</button>
  <button onclick="seedKnot()">Seed Scalar Knot (Q ≈ 6840)</button>
  <button onclick="togglePause()">⏸ Pause / ▶ Resume</button>
  <button onclick="resetAll()">Reset</button>
  <div style="margin-top:12px; font-size:14px;">
    Steps/frame: <input id="steps" type="number" value="12" style="width:70px; background:#111; color:#0f0; border:none;">
    <span id="stats" style="display:block; margin-top:8px;">N = 16384 | β_eff ≈ 3.000 | Q = 0.00</span>
  </div>
</div>
<div id="info">Live EUT II pre-geometry • 16384-site lattice relaxing under exact Dirichlet energy + β≈3 attractor<br>
Green = high rigidity (kept) • Watch knots stabilize with entropic charge Q</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
// ============== ENTROPIUM v2 ==============
let scene, camera, renderer, points;
let S = new Float32Array(16384);
let velocities = new Float32Array(16384);
let beta_eff = 2.7;
let isPaused = false;
let frame = 0;
let knotActive = false;

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
  camera.position.set(40, 30, 80);
  
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
  document.body.appendChild(renderer.domElement);

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(16384*3), 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(16384*3), 3));
  
  const material = new THREE.PointsMaterial({
    size: 1.1,
    vertexColors: true,
    transparent: true,
    opacity: 0.95
  });
  points = new THREE.Points(geometry, material);
  scene.add(points);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function updatePositionsAndColors() {
  const pos = points.geometry.attributes.position.array;
  const col = points.geometry.attributes.color.array;
  let totalQ = 0;

  for (let i = 0; i < S.length; i++) {
    const idx = i * 3;
    // Force-directed 3D embedding driven by local forces (much closer to real EUT graph)
    const x = (i % 32) * 1.8 - 28 + S[i] * 4;
    const y = (Math.floor(i/32) % 32) * 1.8 - 28 + S[i] * 3;
    const z = Math.floor(i/1024) * 2 - 16 + Math.sin(S[i]*2) * 6;
    
    pos[idx] = x; pos[idx+1] = y; pos[idx+2] = z;

    // Color by local rigidity approximation
    const rigidity = Math.min(1, Math.abs(S[i]) * 0.6 + 0.3);
    col[idx]   = rigidity * 0.2;      // R
    col[idx+1] = rigidity * 1.0;      // G (brighter = higher rigidity)
    col[idx+2] = rigidity * 0.6;      // B

    totalQ += Math.abs(S[i]) * 0.5; // rough proxy for entropic charge
  }
  points.geometry.attributes.position.needsUpdate = true;
  points.geometry.attributes.color.needsUpdate = true;
  return totalQ;
}

function relaxStep(steps = 12) {
  for (let s = 0; s < steps; s++) {
    for (let i = 0; i < S.length; i++) {
      let force = 0;
      // Sample ~40 random bonds per site (very close to full pairwise behavior at this scale)
      for (let k = 0; k < 40; k++) {
        const j = Math.floor(Math.random() * S.length);
        if (i === j) continue;
        const delta = S[i] - S[j];
        const w = Math.pow(1 + delta*delta, -beta_eff); // exact EUT bond stiffness
        force += w * delta * 1.8;
      }
      velocities[i] = velocities[i] * 0.88 + force * 0.0012;
      S[i] += velocities[i] * 0.25;
    }
    beta_eff = beta_eff * 0.992 + 3.0 * 0.008; // drift to rigidity attractor
  }
  frame++;
}

function animate() {
  if (!isPaused) {
    const steps = parseInt(document.getElementById('steps').value) || 12;
    relaxStep(steps);
    const Q = updatePositionsAndColors();
    document.getElementById('stats').innerHTML = 
      `N = 16384 | β_eff ≈ ${beta_eff.toFixed(3)} | step ${frame} | Q ≈ ${Q.toFixed(0)}`;
  }

  const t = Date.now() * 0.0004;
  camera.position.x = Math.sin(t) * 95;
  camera.position.y = 45 + Math.cos(t*0.7) * 20;
  camera.position.z = Math.cos(t) * 95;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

function seedLattice() {
  for (let i = 0; i < S.length; i++) S[i] = (Math.random() - 0.5) * 7;
  velocities.fill(0);
  beta_eff = 2.6;
  frame = 0;
  knotActive = false;
}

function seedKnot() {
  // Place a strong negative core knot (Paper 3)
  const center = Math.floor(S.length / 2);
  for (let i = 0; i < S.length; i++) {
    const d = Math.random() * 8;
    S[i] = (i === center ? -8 : -1) + (Math.random() - 0.5) * d;
  }
  velocities.fill(0);
  beta_eff = 3.0;
  knotActive = true;
  frame = 0;
}

function togglePause() { isPaused = !isPaused; }
function resetAll() { seedLattice(); }

init();
seedLattice();
animate();
</script>
</body>
</html>
